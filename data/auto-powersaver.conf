# FedoraUsage Auto-Powersaver configuration.
# This file is installed as /etc/fedorausage/auto-powersaver.conf.
[auto_powersaver]
enabled = true
normal_profile = balanced
hot_profile = powersave
hot_threshold_c = 82
recovery_threshold_c = 72
poll_interval_seconds = 5
recovery_dwell_seconds = 30
recovery_reading_count = 3
manual_override_seconds = 1800
allow_single_sensor_degraded_operation = true
disable_behavior = leave_unchanged
hot_protection_when_disabled = true
